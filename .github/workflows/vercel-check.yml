name: Check Vercel Deployments

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get Vercel info and save to file
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          USER=$(curl -s "https://api.vercel.com/v2/user" -H "Authorization: Bearer $VERCEL_TOKEN")
          PROJECTS=$(curl -s "https://api.vercel.com/v9/projects" -H "Authorization: Bearer $VERCEL_TOKEN")
          DEPS=$(curl -s "https://api.vercel.com/v6/deployments?limit=3" -H "Authorization: Bearer $VERCEL_TOKEN")

          python3 << PYEOF
          import json

          user = json.loads('''$USER''')
          projects = json.loads('''$PROJECTS''')
          deps = json.loads('''$DEPS''')

          u = user.get('user', user)
          result = {
            "orgId": u.get('id'),
            "username": u.get('username'),
            "projects": [{"name": p['name'], "id": p['id'], "accountId": p.get('accountId')} for p in projects.get('projects', [])],
            "deployments": [{"url": d.get('url'), "state": d.get('state'), "name": d.get('name')} for d in deps.get('deployments', [])]
          }

          with open('.vercel-info.json', 'w') as f:
              json.dump(result, f, indent=2)

          print(json.dumps(result, indent=2, ensure_ascii=False))
          PYEOF

      - name: Commit info file
        run: |
          git config user.email "ci@wassel.app"
          git config user.name "Wassel CI"
          git add .vercel-info.json
          git diff --staged --quiet || git commit -m "ci: save vercel project info"
          git push
