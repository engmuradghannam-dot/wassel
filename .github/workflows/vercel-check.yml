name: Check Vercel Deployments

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Get Vercel project info
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          GH_PAT: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npm install -g vercel@latest
          
          echo "## Vercel Info" >> $GITHUB_STEP_SUMMARY
          
          echo "### whoami" >> $GITHUB_STEP_SUMMARY
          vercel whoami --token "$VERCEL_TOKEN" 2>&1 | tee -a $GITHUB_STEP_SUMMARY || true
          
          echo "### projects" >> $GITHUB_STEP_SUMMARY  
          vercel project ls --token "$VERCEL_TOKEN" 2>&1 | tee -a $GITHUB_STEP_SUMMARY || true
          
          echo "### API user" >> $GITHUB_STEP_SUMMARY
          curl -s "https://api.vercel.com/v2/user" \
            -H "Authorization: Bearer $VERCEL_TOKEN" | \
            python3 -c "import sys,json; u=json.load(sys.stdin).get('user',{}); print(f'ID: {u.get(\"id\")} Username: {u.get(\"username\")}')" \
            2>&1 | tee -a $GITHUB_STEP_SUMMARY || true
            
          echo "### API projects" >> $GITHUB_STEP_SUMMARY
          curl -s "https://api.vercel.com/v9/projects" \
            -H "Authorization: Bearer $VERCEL_TOKEN" | \
            python3 -c "
          import sys,json
          d=json.load(sys.stdin)
          for p in d.get('projects',[]):
              print(f'- {p[\"name\"]} ID={p[\"id\"]} account={p.get(\"accountId\",\"?\")}')
          " 2>&1 | tee -a $GITHUB_STEP_SUMMARY || true
          
          echo "### recent deployments" >> $GITHUB_STEP_SUMMARY
          curl -s "https://api.vercel.com/v6/deployments?limit=5" \
            -H "Authorization: Bearer $VERCEL_TOKEN" | \
            python3 -c "
          import sys,json
          d=json.load(sys.stdin)
          for dep in d.get('deployments',[]):
              print(f'- {dep.get(\"url\")} state={dep.get(\"state\")} name={dep.get(\"name\")}')
          " 2>&1 | tee -a $GITHUB_STEP_SUMMARY || true
