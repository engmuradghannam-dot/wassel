name: Check Vercel Deployments

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Vercel CLI and get project info
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          npm install -g vercel@latest
          
          # List projects via CLI
          echo "=== Vercel CLI whoami ==="
          vercel whoami --token "$VERCEL_TOKEN" || true
          
          echo "=== Vercel projects list ==="
          vercel project ls --token "$VERCEL_TOKEN" 2>&1 || true
          
          # Get via API and save simply
          ORG_ID=$(curl -s "https://api.vercel.com/v2/user" \
            -H "Authorization: Bearer $VERCEL_TOKEN" | \
            python3 -c "import sys,json; print(json.load(sys.stdin).get('user',{}).get('id','NOT_FOUND'))")
          
          PROJECT_ID=$(curl -s "https://api.vercel.com/v9/projects" \
            -H "Authorization: Bearer $VERCEL_TOKEN" | \
            python3 -c "
          import sys,json
          d=json.load(sys.stdin)
          projects=d.get('projects',[])
          print('TOTAL:', len(projects))
          for p in projects:
              print('NAME:', p['name'], 'ID:', p['id'])
          ")
          
          echo "ORG_ID: $ORG_ID"
          echo "$PROJECT_ID"
          
          # Save to file
          echo "{\"orgId\":\"$ORG_ID\"}" > .vercel-info.json
          
      - name: Push info
        run: |
          git config user.email "ci@wassel.app"
          git config user.name "CI"
          git add .vercel-info.json
          git diff --staged --quiet || (git commit -m "ci: vercel info" && git push)
