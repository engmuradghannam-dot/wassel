name: Check Vercel Deployments

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: List Vercel deployments
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          echo "=== All Projects ==="
          curl -s "https://api.vercel.com/v9/projects" \
            -H "Authorization: Bearer $VERCEL_TOKEN" | python3 -c "
          import sys,json
          d=json.load(sys.stdin)
          for p in d.get('projects',[]):
              print(f'Project: {p[\"name\"]} | ID: {p[\"id\"]} | URL: {p.get(\"alias\",[\"?\"])[0] if p.get(\"alias\") else \"?\"}')
          "
          
          echo "=== Recent Deployments ==="
          curl -s "https://api.vercel.com/v6/deployments?limit=5" \
            -H "Authorization: Bearer $VERCEL_TOKEN" | python3 -c "
          import sys,json
          d=json.load(sys.stdin)
          for dep in d.get('deployments',[]):
              print(f'URL: {dep.get(\"url\",\"?\")} | State: {dep.get(\"state\",\"?\")} | Created: {dep.get(\"created\",\"?\")}')
          "
          
          echo "=== Token Test ==="
          curl -s "https://api.vercel.com/v2/user" \
            -H "Authorization: Bearer $VERCEL_TOKEN" | python3 -c "
          import sys,json
          d=json.load(sys.stdin)
          u=d.get('user',d)
          print(f'Username: {u.get(\"username\",\"?\")} | ID: {u.get(\"id\",\"?\")}')
          "
