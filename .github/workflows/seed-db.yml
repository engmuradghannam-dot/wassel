name: Seed Database (Superadmin)

on:
  workflow_dispatch:

jobs:
  seed:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install deps
        run: |
          cd server
          npm install

      - name: Create superadmin via MongoDB
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
        run: |
          node << 'JSEOF'
          const mongoose = require('/home/runner/work/wassel/wassel/server/node_modules/mongoose');
          const bcrypt   = require('/home/runner/work/wassel/wassel/server/node_modules/bcryptjs');

          const MONGODB_URI = process.env.MONGODB_URI;
          const EMAIL    = 'eng.murad.ghannam@gmail.com';
          const PASSWORD = 'Admin2026@';

          const CompanySchema = new mongoose.Schema({
            name: String, nameEn: String, currency: { type: String, default: 'SAR' },
            timezone: String, plan: String, planExpiresAt: Date,
            maxUsers: Number, maxEmployees: Number, maxBranches: Number,
            isActive: { type: Boolean, default: true }, isSuspended: { type: Boolean, default: false },
            owner: mongoose.Schema.Types.ObjectId, createdBy: mongoose.Schema.Types.ObjectId
          }, { timestamps: true });

          const UserSchema = new mongoose.Schema({
            name: String, email: { type: String, unique: true },
            password: { type: String, default: null },
            googleId: { type: String, default: null },
            role: { type: String, default: 'user' },
            company: { type: mongoose.Schema.Types.ObjectId, ref: 'Company', default: null },
            avatar: String, isOnline: { type: Boolean, default: false },
            lastSeen: Date, isActive: { type: Boolean, default: true }
          }, { timestamps: true });

          (async () => {
            try {
              await mongoose.connect(MONGODB_URI);
              console.log('✅ Connected to MongoDB');

              const Company = mongoose.models.Company || mongoose.model('Company', CompanySchema);
              const User    = mongoose.models.User    || mongoose.model('User', UserSchema);

              // Create or find company
              let company = await Company.findOne({ name: 'Wassel' });
              if (!company) {
                company = await Company.create({
                  name: 'Wassel', nameEn: 'Wassel', currency: 'SAR',
                  timezone: 'Asia/Riyadh', plan: 'enterprise',
                  planExpiresAt: new Date('2030-01-01'),
                  maxUsers: 9999, maxEmployees: 9999, maxBranches: 99,
                  isActive: true
                });
                console.log('✅ Company created:', company.name);
              } else {
                console.log('ℹ️  Company exists:', company.name);
              }

              const hashedPw = await bcrypt.hash(PASSWORD, 10);

              // Upsert superadmin
              const user = await User.findOneAndUpdate(
                { email: EMAIL },
                {
                  $set: {
                    name: 'Murad Ghannam',
                    email: EMAIL,
                    password: hashedPw,
                    role: 'superadmin',
                    company: company._id,
                    isActive: true,
                    lastSeen: new Date()
                  }
                },
                { upsert: true, new: true, setDefaultsOnInsert: true }
              );

              // Update company owner
              await Company.findByIdAndUpdate(company._id, { owner: user._id, createdBy: user._id });

              console.log('');
              console.log('🎉 Superadmin ready!');
              console.log('📧 Email:   ', EMAIL);
              console.log('🔑 Password:', PASSWORD);
              console.log('👤 Role:    superadmin');
              console.log('🏢 Company: ', company.name);

              await mongoose.disconnect();
              process.exit(0);
            } catch (err) {
              console.error('❌ Error:', err.message);
              process.exit(1);
            }
          })();
          JSEOF
