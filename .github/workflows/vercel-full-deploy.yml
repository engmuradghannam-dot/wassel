name: Vercel Full Deploy

on:
  workflow_dispatch:
  push:
    branches: [main, master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Get Vercel IDs and set secrets
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Get project info
          USER_INFO=$(curl -s "https://api.vercel.com/v2/user" -H "Authorization: Bearer $VERCEL_TOKEN")
          ORG_ID=$(echo "$USER_INFO" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('user',d).get('id',''))")
          
          PROJ_INFO=$(curl -s "https://api.vercel.com/v9/projects?limit=20" -H "Authorization: Bearer $VERCEL_TOKEN")
          PROJECT_ID=$(echo "$PROJ_INFO" | python3 -c "
          import sys,json
          d=json.load(sys.stdin)
          for p in d.get('projects',[]):
              if 'wassel' in p['name'].lower():
                  print(p['id'])
                  break
          ")
          
          echo "ORG_ID: $ORG_ID"
          echo "PROJECT_ID: $PROJECT_ID"
          
          # Export for next steps
          echo "VERCEL_ORG_ID=$ORG_ID" >> $GITHUB_ENV
          echo "VERCEL_PROJECT_ID=$PROJECT_ID" >> $GITHUB_ENV

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Build client
        run: |
          cd client
          npm install --legacy-peer-deps
          CI=false npm run build

      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          cd client
          if [ -n "$VERCEL_PROJECT_ID" ] && [ -n "$VERCEL_ORG_ID" ]; then
            vercel --token $VERCEL_TOKEN --prod --yes \
              --scope $VERCEL_ORG_ID \
              -e REACT_APP_API_URL=https://wassel-cyj5.onrender.com
          else
            vercel --token $VERCEL_TOKEN --prod --yes \
              -e REACT_APP_API_URL=https://wassel-cyj5.onrender.com
          fi
