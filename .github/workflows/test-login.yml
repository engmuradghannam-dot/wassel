name: Test Login API

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Test backend
        run: |
          echo "=== Health ==="
          curl -s --max-time 30 https://wassel-cyj5.onrender.com/api/health | python3 -c "
          import sys,json
          try:
              d=json.load(sys.stdin)
              print('✅ Health:', d.get('status'), '| Modules:', len(d.get('modules',[])))
          except Exception as e:
              print('❌ Health error:', e)
          "

          echo "=== Login Test ==="
          curl -s --max-time 30 -X POST https://wassel-cyj5.onrender.com/api/users/login \
            -H "Content-Type: application/json" \
            -d '{"email":"eng.murad.ghannam@gmail.com","password":"Admin2026@"}' | python3 -c "
          import sys,json
          try:
              d=json.load(sys.stdin)
              if d.get('success'):
                  print('✅ LOGIN OK - Role:', d['data']['user']['role'])
              else:
                  print('❌ LOGIN FAIL:', d.get('message'))
                  print('Full response:', json.dumps(d))
          except Exception as e:
              print('❌ Parse error:', e)
              print('Raw:', sys.stdin.read()[:300])
          "
          
          echo "=== Check User in DB ==="
          curl -s --max-time 30 -X POST https://wassel-cyj5.onrender.com/api/setup/setup-admin \
            -H "Content-Type: application/json" \
            -d '{"name":"Murad Ghannam","email":"eng.murad.ghannam@gmail.com","password":"Admin2026@"}' | python3 -c "
          import sys,json
          try:
              d=json.load(sys.stdin)
              print('Setup response:', json.dumps(d))
          except: print('Raw:', sys.stdin.read()[:200])
          "
