name: Upload to Google Drive

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install google-auth google-auth-oauthlib google-auth-httplib2 google-api-python-client

      - name: Create ZIP archive
        run: |
          zip -r wassel-project.zip . -x "*.git*" -x "node_modules/*" -x "*.env"

      - name: Upload to Google Drive
        env:
          GDRIVE_CREDENTIALS: ${{ secrets.GDRIVE_CREDENTIALS }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
        run: |
          python << 'EOF'
          import os
          import base64
          import json
          from google.oauth2 import service_account
          from googleapiclient.discovery import build
          from googleapiclient.http import MediaFileUpload

          # Decode credentials
          credentials_json = base64.b64decode(os.environ['GDRIVE_CREDENTIALS']).decode()
          credentials_info = json.loads(credentials_json)

          # Authenticate
          credentials = service_account.Credentials.from_service_account_info(
              credentials_info,
              scopes=['https://www.googleapis.com/auth/drive']
          )

          # Build Drive service
          service = build('drive', 'v3', credentials=credentials)

          # Upload file
          file_metadata = {
              'name': 'wassel-project.zip',
              'parents': [os.environ['GDRIVE_FOLDER_ID']]
          }

          media = MediaFileUpload('wassel-project.zip', mimetype='application/zip')
          file = service.files().create(body=file_metadata, media_body=media, fields='id').execute()

          print(f"✅ File uploaded successfully!")
          print(f"📁 File ID: {file.get('id')}")
          print(f"🔗 URL: https://drive.google.com/file/d/{file.get('id')}/view")
          EOF
