name: Vercel Debug

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get Vercel IDs and write to file
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          python3 - << 'PYEOF'
          import urllib.request, json

          token = "${{ secrets.VERCEL_TOKEN }}"
          
          def fetch(url):
              req = urllib.request.Request(url, headers={"Authorization": f"Bearer {token}"})
              try:
                  with urllib.request.urlopen(req) as r:
                      return json.load(r)
              except Exception as e:
                  return {"error": str(e)}
          
          user = fetch("https://api.vercel.com/v2/user")
          projects = fetch("https://api.vercel.com/v9/projects")
          teams = fetch("https://api.vercel.com/v2/teams")
          
          u = user.get("user", user)
          result = {
              "org_id": u.get("id", ""),
              "username": u.get("username", ""),
              "user_raw": user,
              "projects": projects.get("projects", []),
              "teams": teams,
          }
          
          with open("vercel-ids.json", "w") as f:
              json.dump(result, f, indent=2)
          
          print("ORG_ID:", result["org_id"])
          print("USERNAME:", result["username"])
          for p in result["projects"]:
              print(f"PROJECT: {p['name']} -> {p['id']}")
          PYEOF

      - name: Commit IDs file
        run: |
          git config user.email "ci@wassel.app"
          git config user.name "CI Bot"
          git add vercel-ids.json
          git diff --staged --quiet || git commit -m "ci: save vercel IDs [skip ci]"
          git push
