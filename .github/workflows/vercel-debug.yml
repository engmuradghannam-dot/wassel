name: Vercel Debug

on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: Get Vercel IDs
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          echo "## Vercel User Info" >> $GITHUB_STEP_SUMMARY
          USER=$(curl -s "https://api.vercel.com/v2/user" -H "Authorization: Bearer $VERCEL_TOKEN")
          echo "User raw: $USER"
          echo "$USER" >> $GITHUB_STEP_SUMMARY
          
          echo "## Projects" >> $GITHUB_STEP_SUMMARY
          PROJECTS=$(curl -s "https://api.vercel.com/v9/projects" -H "Authorization: Bearer $VERCEL_TOKEN")
          echo "Projects raw: $PROJECTS"
          echo "$PROJECTS" >> $GITHUB_STEP_SUMMARY
          
          echo "## Teams" >> $GITHUB_STEP_SUMMARY
          TEAMS=$(curl -s "https://api.vercel.com/v2/teams" -H "Authorization: Bearer $VERCEL_TOKEN")
          echo "Teams raw: $TEAMS"
          echo "$TEAMS" >> $GITHUB_STEP_SUMMARY
