name: Vercel Setup (run once)

on:
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get Vercel IDs and create project.json
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          USER=$(curl -s "https://api.vercel.com/v2/user" -H "Authorization: Bearer $VERCEL_TOKEN")
          ORG_ID=$(echo "$USER" | python3 -c "import sys,json; print(json.load(sys.stdin).get('user',{}).get('id',''))")
          
          PROJECTS=$(curl -s "https://api.vercel.com/v9/projects" -H "Authorization: Bearer $VERCEL_TOKEN")
          PROJECT_ID=$(echo "$PROJECTS" | python3 -c "
          import sys,json,re
          d=json.load(sys.stdin)
          projects=d.get('projects',[])
          print('ALL PROJECTS:')
          for p in projects:
              print(f'  {p[\"name\"]} -> {p[\"id\"]}')
          ")
          
          echo "ORG_ID: $ORG_ID"
          echo "$PROJECT_ID"
          
          # Get first project ID
          FIRST_PROJ=$(echo "$PROJECTS" | python3 -c "
          import sys,json
          d=json.load(sys.stdin)
          if d.get('projects'):
              p=d['projects'][0]
              print(p['id'])
          ")
          echo "First project ID: $FIRST_PROJ"
          
          # Create .vercel dir and project.json
          mkdir -p client/.vercel
          echo "{\"orgId\":\"$ORG_ID\",\"projectId\":\"$FIRST_PROJ\"}" > client/.vercel/project.json
          cat client/.vercel/project.json

      - name: Commit project.json
        run: |
          git config user.email "ci@wassel.app"
          git config user.name "Wassel CI"
          git add client/.vercel/project.json
          git diff --staged --quiet || git commit -m "ci: add Vercel project.json for CLI deployment"
          git push
