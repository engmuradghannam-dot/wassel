name: Vercel Deploy Final

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install & Build
        run: |
          cd client
          npm install --legacy-peer-deps
          CI=false REACT_APP_API_URL=https://wassel-cyj5.onrender.com npm run build

      - name: Deploy via Vercel API
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          # Get org and project
          USER=$(curl -s "https://api.vercel.com/v2/user" -H "Authorization: Bearer $VERCEL_TOKEN")
          ORG_ID=$(echo "$USER" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('user',d).get('id',''))" 2>/dev/null || echo "")

          PROJECTS=$(curl -s "https://api.vercel.com/v9/projects" -H "Authorization: Bearer $VERCEL_TOKEN")
          PROJECT_ID=$(echo "$PROJECTS" | python3 -c "
          import sys,json
          d=json.load(sys.stdin)
          for p in d.get('projects',[]):
              print(p['id'])
              break
          " 2>/dev/null || echo "")

          echo "ORG_ID: $ORG_ID"
          echo "PROJECT_ID: $PROJECT_ID"

          # Write project.json
          mkdir -p client/.vercel
          printf '{"orgId":"%s","projectId":"%s"}' "$ORG_ID" "$PROJECT_ID" > client/.vercel/project.json
          cat client/.vercel/project.json

          # Use vercel CLI with prebuilt output
          npm install -g vercel@latest

          # Deploy prebuilt
          cd client
          DEPLOY_URL=$(vercel deploy --prebuilt --prod \
            --token "$VERCEL_TOKEN" \
            --yes 2>&1)
          echo "Deploy result: $DEPLOY_URL"
          
          # Check if it worked
          if echo "$DEPLOY_URL" | grep -q "vercel.app\|https://"; then
            echo "✅ Deploy successful!"
          else
            echo "Deploy output: $DEPLOY_URL"
            # Try without --prebuilt
            vercel deploy --prod --token "$VERCEL_TOKEN" --yes --cwd . 2>&1 || true
          fi
