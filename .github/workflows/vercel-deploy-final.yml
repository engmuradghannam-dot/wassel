name: Vercel Deploy Final

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel Deploy Hook
        run: |
          curl -s -X POST \
            "https://api.vercel.com/v1/integrations/deploy/prj_AOPJi4HUR2Yj1BgI1Lc1ZAXqb1Il/7YMMWeFksb" \
            | python3 -c "
          import sys,json
          try:
              d=json.load(sys.stdin)
              print('✅ Deploy triggered:', d.get('job',{}).get('id'), d.get('job',{}).get('state'))
          except:
              print('Response:', sys.stdin.read()[:200])
          "
