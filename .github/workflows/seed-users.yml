name: Seed Demo Users
on:
  workflow_dispatch:
jobs:
  seed:
    runs-on: ubuntu-latest
    steps:
      - name: Seed demo users
        run: |
          BASE="https://wassel-cyj5.onrender.com"
          
          seed_user() {
            NAME=$1; EMAIL=$2; COMPANY=$3
            RES=$(curl -s -X POST "$BASE/api/users/register" \
              -H "Content-Type: application/json" \
              -d "{\"name\":\"$NAME\",\"email\":\"$EMAIL\",\"password\":\"Demo2026@\",\"companyName\":\"$COMPANY\"}")
            MSG=$(echo "$RES" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('message','?'))" 2>/dev/null || echo "parse error")
            echo "$NAME => $MSG"
          }
          
          seed_user "أحمد الشريف" "ahmed.sharif@demo.com" "شركة النهضة للتجارة"
          seed_user "سارة المطيري" "sara.mutairi@demo.com" "مجموعة الخليج للتجارة"
          seed_user "محمد الزهراني" "m.zahrani@demo.com" "حلول التقنية السعودية"
          seed_user "فاطمة العتيبي" "fatima.otaibi@demo.com" "شركة العتيبي للاستيراد"
          
          echo ""
          echo "=== Verify ==="
          LOGIN=$(curl -s -X POST "$BASE/api/users/login" \
            -H "Content-Type: application/json" \
            -d '{"email":"eng.murad.ghannam@gmail.com","password":"Admin2026@"}')
          TOKEN=$(echo "$LOGIN" | python3 -c "import sys,json; print(json.load(sys.stdin).get('token',''))")
          
          curl -s "$BASE/api/users/chat-contacts" \
            -H "Authorization: Bearer $TOKEN" | \
            python3 -c "
import sys,json
d=json.load(sys.stdin)
print('Total contacts:', d.get('count',0))
for u in d.get('data',[]):
    co = u.get('company') or {}
    coname = co.get('name','—') if isinstance(co,dict) else '—'
    print(f'  ✓ {u[\"name\"]} | {coname}')
"
